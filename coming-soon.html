<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Favicon -->
    <link rel='icon' type='image/svg+xml' href='favicon.svg'>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | AccessAudit Portfolio</title>
    <meta name="description" content="A new digital accessibility consulting platform is launching soon. Subscribe for updates.">
    <!-- Bootstrap CSS -->
    <link id="bootstrap-style" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom Style sheets -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body>

    <!-- Fixed Toggles Top-Right -->
    <div class="position-fixed top-0 end-0 p-3 z-3 d-flex gap-2">
        <button class="toggle-btn theme-toggle-btn" aria-label="Toggle dark mode"></button><button class="toggle-btn rtl-toggle-btn" aria-label="Toggle direction"></button>
    </div>

    <!-- Centered Content -->
    <div class="auth-wrapper text-center">
        <div class="p-4 max-width-600">
            <svg width="180" height="50" viewBox="0 0 180 50" xmlns="http://www.w3.org/2000/svg" fill="none" class="text-primary mx-auto mb-4">
                <circle cx="25" cy="25" r="20" stroke="currentColor" stroke-width="2.5" />
                <circle cx="25" cy="15" r="4.5" fill="currentColor" />
                <path d="M15 22h20M25 22v15M19 37l6-15 6 15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                <text x="55" y="32" font-family="'Outfit', sans-serif" font-size="20" font-weight="580" fill="currentColor">AccessAudit</text>
            </svg>
            <h1 class="h1-title text-primary mb-3">Launching Soon</h1>
            <p class="body-text text-muted mb-5">I am rebuilding my accessibility consulting portal from the ground up to follow WCAG 2.2 AAA guidelines. Enter your email to be notified when we launch.</p>
            <form class="d-flex gap-2 max-width-500 mx-auto">
                <input type="email" class="form-control" placeholder="Email Address" required aria-label="Launch subscriber email">
                <button type="submit" class="btn-custom-primary">Notify Me</button>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core JS -->
    <script src="assets/js/main.js"></script>
</body>
</html>
