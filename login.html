<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Favicon -->
    <link rel='icon' type='image/svg+xml' href='favicon.svg'>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AccessAudit Portfolio</title>
    <meta name="description" content="Access your personalized accessibility compliance client dashboard.">
    <!-- Bootstrap CSS -->
    <link id="bootstrap-style" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom Style sheets -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body>

    <!-- Fixed Toggles Top-Right -->
    <div class="position-fixed top-0 end-0 p-3 z-3 d-flex gap-2">
        <button class="toggle-btn theme-toggle-btn" aria-label="Toggle dark mode"></button><button class="toggle-btn rtl-toggle-btn" aria-label="Toggle direction"></button>
    </div>

    <!-- Centered Form -->
    <div class="auth-wrapper">
        <div class="auth-card">
            <!-- Branding -->
            <div class="text-center mb-4">
                <a href="index.html">
                    <svg width="180" height="50" viewBox="0 0 180 50" xmlns="http://www.w3.org/2000/svg" fill="none" class="text-primary mx-auto">
                        <circle cx="25" cy="25" r="20" stroke="currentColor" stroke-width="2.5" />
                        <circle cx="25" cy="15" r="4.5" fill="currentColor" />
                        <path d="M15 22h20M25 22v15M19 37l6-15 6 15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                        <text x="55" y="32" font-family="'Outfit', sans-serif" font-size="20" font-weight="580" fill="currentColor">AccessAudit</text>
                    </svg>
                </a>
                <h2 class="h2-title fs-3 mt-3">Welcome Back</h2>
                <p class="body-text caption-text">Login to access your active audit reports.</p>
            </div>

            <!-- Login Form -->
            <form>
                <div class="mb-3">
                    <label for="login-email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="login-email" required>
                </div>
                <div class="mb-3">
                    <label for="login-password" class="form-label">Password</label>
                    <div class="position-relative">
                        <input type="password" class="form-control pe-5" id="login-password" required>
                        <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3 toggle-password-visibility cursor-pointer text-muted" data-target="login-password" style="font-size: 1.25rem;"></i>
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember-me">
                        <label class="form-check-label caption-text" for="remember-me">Remember Me</label>
                    </div>
                    <a href="404.html" class="text-decoration-none caption-text text-primary">Forgot Password?</a>
                </div>
                <button type="submit" class="btn-custom-primary w-100 py-2">Sign In</button>
            </form>

            <div class="text-center my-4">
                <span class="caption-text text-muted">or continue with</span>
            </div>

            <!-- Social Logins -->
            <div class="d-flex justify-content-center gap-3 mb-4">
                <button class="btn btn-outline-light border text-dark w-50 py-2 d-flex align-items-center justify-content-center gap-2" aria-label="Sign in with Google">
                    <i class="bi bi-google text-danger"></i> <span class="caption-text fw-bold">Google</span>
                </button>
                <button class="btn btn-outline-light border text-dark w-50 py-2 d-flex align-items-center justify-content-center gap-2" aria-label="Sign in with Apple">
                    <i class="bi bi-apple"></i> <span class="caption-text fw-bold">Apple</span>
                </button>
            </div>

            <div class="text-center">
                <p class="caption-text mb-0 text-muted">Don't have an account? <a href="register.html" class="text-decoration-none text-primary">Register Here</a></p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core JS -->
    <script src="assets/js/main.js"></script>
</body>
</html>
