<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Favicon -->
    <link rel='icon' type='image/svg+xml' href='favicon.svg'>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AccessAudit Portfolio</title>
    <meta name="description" content="Register to manage your WCAG audit reports and view active consulting tickets.">
    <!-- Bootstrap CSS -->
    <link id="bootstrap-style" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- Custom Style sheets -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body>

    <!-- Fixed Toggles Top-Right -->
    <div class="viewport-fixed-toggles d-flex gap-2">
        <button class="toggle-btn theme-toggle-btn" aria-label="Toggle dark mode"></button><button class="toggle-btn rtl-toggle-btn" aria-label="Toggle direction">RTL</button>
    </div>

    <!-- Centered Form -->
    <div class="auth-wrapper">
        <div class="auth-card">
            <!-- Branding -->
            <div class="text-center mb-4">
                <a href="index.html">
                    <svg width="180" height="50" viewBox="0 0 180 50" xmlns="http://www.w3.org/2000/svg" fill="none" class="text-primary mx-auto">
                        <circle cx="25" cy="25" r="20" stroke="currentColor" stroke-width="2.5" />
                        <circle cx="25" cy="15" r="4.5" fill="currentColor" />
                        <path d="M15 22h20M25 22v15M19 37l6-15 6 15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                        <text x="55" y="32" font-family="'Outfit', sans-serif" font-size="20" font-weight="580" fill="currentColor">AccessAudit</text>
                    </svg>
                </a>
                <h2 class="h2-title fs-3 mt-3">Create Account</h2>
                <p class="body-text caption-text">Sign up to manage your compliance timeline.</p>
            </div>

            <!-- Registration Form -->
            <form>
                <div class="mb-3">
                    <label for="register-name" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="register-name" required>
                </div>
                <div class="mb-3">
                    <label for="register-email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="register-email" required>
                </div>
                <div class="mb-3">
                    <label for="register-password" class="form-label">Password</label>
                    <div class="position-relative">
                        <input type="password" class="form-control pe-5" id="register-password" required>
                        <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3 toggle-password-visibility cursor-pointer text-muted" data-target="register-password" style="font-size: 1.25rem;"></i>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="confirm-password" class="form-label">Confirm Password</label>
                    <div class="position-relative">
                        <input type="password" class="form-control pe-5" id="confirm-password" required>
                        <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3 toggle-password-visibility cursor-pointer text-muted" data-target="confirm-password" style="font-size: 1.25rem;"></i>
                    </div>
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="privacy-agree" required>
                    <label class="form-check-label caption-text text-muted" for="privacy-agree">I agree to the <a href="404.html" class="text-decoration-none text-primary">Privacy Policy</a> and <a href="404.html" class="text-decoration-none text-primary">Terms of Service</a></label>
                </div>
                <button type="submit" class="btn-custom-primary w-100 py-3">Sign Up</button>
            </form>

            <div class="text-center my-4">
                <span class="caption-text text-muted">or sign up with</span>
            </div>

            <!-- Social Logins -->
            <div class="d-flex justify-content-center gap-3 mb-4">
                <button class="btn btn-social w-50 py-2 d-flex align-items-center justify-content-center gap-2" aria-label="Sign up with Google">
                    <i class="bi bi-google text-danger"></i> <span class="caption-text fw-bold">Google</span>
                </button>
                <button class="btn btn-social w-50 py-2 d-flex align-items-center justify-content-center gap-2" aria-label="Sign up with Apple">
                    <i class="bi bi-apple"></i> <span class="caption-text fw-bold">Apple</span>
                </button>
            </div>

            <div class="text-center">
                <p class="caption-text mb-0 text-muted">Already have an account? <a href="login.html" class="text-decoration-none text-primary">Login Here</a></p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core JS -->
    <script src="assets/js/main.js"></script>
</body>
</html>
